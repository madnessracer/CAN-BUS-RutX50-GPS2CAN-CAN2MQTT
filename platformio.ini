; PlatformIO Project Configuration File
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html

[platformio]
build_cache_dir = .pio/buildcache

[env]
platform = espressif32
board = esp32-s3-devkitc-1
framework = arduino

; Board-spezifische Builds für 16MB Flash und 8MB PSRAM
board_build.flash_size = 16MB
board_build.esp32_psram = enabled
board_build.partitions = default_16MB.csv

; ZWINGEND ERFORDERLICH für 8MB/16MB PSRAM (Octal-SPI)
;board_build.arduino.memory_type = qio_opi
board_build.flash_mode = qio
board_upload.flash_size = 16MB
board_upload.maximum_size = 16777216

lib_deps =
    adafruit/Adafruit NeoPixel@^1.11.0

build_flags = 
    -DBOARD_HAS_PSRAM
    -DARDUINO_USB_CDC_ON_BOOT=0
    -DBMS_LEFT
    
   

; Temperatur- und Fehlerabsicherung für das PSRAM
board_build.cmake_extra_args = -DCONFIG_SPIRAM_ECC_ENABLE=1 -DCONFIG_SPIRAM_TEMP_RANGE_EXTENDED=1

; Upload-Geschwindigkeit
upload_speed = 921600

[env:esp32s3_Serial]
upload_port = COM24

[env:esp32s3_OTA]
upload_protocol = espota
upload_port = 172.24.115.132


[env:esp32s3_CAN]

upload_protocol = custom
upload_command = python canable_upload.py --node-id 13 --bitrate 250000 --timeout 30 .pio/build/${PIOENV}/firmware.bin